name: Build Windows Executable (Lite)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (Lite - sin PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_lite.txt
          pip install pyinstaller==6.3.0
        shell: pwsh

      - name: Create required directories
        run: |
          if (!(Test-Path "templates")) { New-Item -ItemType Directory -Path "templates" }
        shell: pwsh

      - name: Build executable (Lite - ONEFILE)
        run: pyinstaller flowvisionai.spec --noconfirm
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowVisionAI-Lite-Windows
          path: dist/FlowVisionAI-Lite.exe
          retention-days: 30

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/FlowVisionAI-Lite.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
