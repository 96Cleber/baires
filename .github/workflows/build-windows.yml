name: Build Windows Executable

on:
  push:
    branches: [main, v1-yolo-headless]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.2 torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements_windows.txt
          pip install pyinstaller==6.3.0
        shell: pwsh

      - name: Create required directories
        run: |
          if (!(Test-Path "weights")) { New-Item -ItemType Directory -Path "weights" }
          if (!(Test-Path "hooks")) { New-Item -ItemType Directory -Path "hooks" }
        shell: pwsh

      - name: Build executable
        run: pyinstaller flowvisionai.spec --noconfirm
        shell: pwsh

      - name: Fix DLL issues post-build
        run: |
          $internalDir = "dist/FlowVisionAI/_internal"
          $torchLibDir = "$internalDir/torch/lib"
          if (Test-Path $torchLibDir) {
            Get-ChildItem -Path $torchLibDir -Filter "*.dll" | ForEach-Object {
              $dest = "$internalDir/$($_.Name)"
              if (!(Test-Path $dest)) {
                Copy-Item $_.FullName -Destination $dest
              }
            }
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowVisionAI-Windows
          path: dist/FlowVisionAI/
          retention-days: 30

      - name: Create Release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist/FlowVisionAI/* -DestinationPath FlowVisionAI-Windows.zip
        shell: pwsh

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: FlowVisionAI-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
